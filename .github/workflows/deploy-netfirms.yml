name: Deploy to Netfirms (FTP)

# Every merge/push to main uploads the static site to Netfirms over FTP.
# Netfirms is classic shared hosting (Apache/cPanel) — there is no native Git
# deploy, so we sync files with an incremental FTP action.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Independent of the Netlify workflow's group, so the two deploys don't cancel
# each other during the migration.
concurrency:
  group: netfirms-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Skip gracefully (with a warning, not a red X) until the FTP secrets exist.
      - name: Check FTP configuration
        id: cfg
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets not set yet — skipping deploy. Add FTP_SERVER, FTP_USERNAME and FTP_PASSWORD in Settings → Secrets and variables → Actions."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via FTP
        if: steps.cfg.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}       # e.g. ftp.yourdomain.com (from the Netfirms panel)
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps                          # if the first run fails on TLS, change to: ftp
          port: 21
          # Netfirms/cPanel web root. `public_html/` is the standard docroot for the
          # PRIMARY domain. If you mapped a SUBDOMAIN with its own document root,
          # point this at that folder instead (check it in Netfirms File Manager).
          server-dir: public_html/
          local-dir: ./
          # Don't ship repo/CI/host-specific files to the public web root:
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/node_modules/**
            .netlify/**
            netlify/**
            netlify.toml
            README.md
            .gitignore
            **/.DS_Store
