# Apolaki marketing site — static, no build step
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Canonicalize the host: 301 the raw Netlify subdomain to the primary domain
# (prevents apolaki-ph.netlify.app from serving duplicate content vs apolaki.ai)
[[redirects]]
  from = "https://apolaki-ph.netlify.app/*"
  to = "https://apolaki.ai/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*/"
  to = "/blog/:splat.html"
  status = 301

# Security + privacy headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'"

# Images/fonts: cache a week (not content-hashed, so don't go immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS/JS: revalidate so edits go live on next deploy (files aren't fingerprinted)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
